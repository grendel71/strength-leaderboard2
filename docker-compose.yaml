services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.up.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./migrations/002_bio.up.sql:/docker-entrypoint-initdb.d/002_bio.sql
      - ./migrations/003_bonus_lifts.up.sql:/docker-entrypoint-initdb.d/003_bonus_lifts.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      timeout: 5s
      retries: 5

  # SeaweedFS
  master:
    image: chrislusf/seaweedfs
    command: master
    ports:
      - "9333:9333"
  volume:
    image: chrislusf/seaweedfs
    command: volume -mserver="master:9333" -port=8080
    depends_on:
      - master
  filer:
    image: chrislusf/seaweedfs
    command: filer -master="master:9333"
    ports:
      - "8888:8888"
    depends_on:
      - master
      - volume
  s3:
    image: chrislusf/seaweedfs
    command: s3 -filer="filer:8888"
    ports:
      - "8333:8333"
    depends_on:
      - filer

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: ${PORT}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    depends_on:
      db:
        condition: service_healthy
      s3:
        condition: service_started

volumes:
  pgdata:
